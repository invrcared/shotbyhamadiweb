<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShotByHamadi | Photography & Videography</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            margin: 0;
        }
        .sage-accent { background-color: #b4d3b0; } /* Your custom brand accent color */
        .text-sage { color: #b4d3b0; }
        .tracking-ultra { letter-spacing: 0.25em; }
    </style>
</head>
<body class="flex flex-col min-h-screen selection:bg-white selection:text-black">

    <main class="flex-grow flex flex-col justify-center items-center text-center px-6">
        
        <div class="mb-12 animate-fade-in">
            <img src="2.png" alt="ShotByHamadi Logo" class="w-40 md:w-56 opacity-95 hover:opacity-100 transition duration-500">
        </div>

        <h1 class="text-3xl md:text-5xl font-light tracking-ultra uppercase mb-4">
            Capture the moment
        </h1>
        
        <p class="text-zinc-500 tracking-[0.4em] uppercase text-[10px] md:text-xs mb-12">
            Professional Photography & Videography
        </p>

        <div class="flex flex-col md:flex-row gap-6">
            <a href="mailto:contact@shotbyhamadi.com" 
               class="border border-zinc-700 px-10 py-4 hover:border-white hover:bg-white hover:text-black transition-all duration-300 uppercase text-[11px] tracking-widest font-bold">
                Get in Touch
            </a>
            
            <a href="https://instagram.com/shotbyhamadi" 
               target="_blank"
               class="sage-accent text-black px-10 py-4 font-black hover:opacity-80 transition-all duration-300 uppercase text-[11px] tracking-widest">
                View Work
            </a>
        </div>
    </main>

    <footer class="p-10 text-center border-t border-zinc-900/50">
        <p class="text-zinc-700 text-[9px] uppercase tracking-[0.5em] font-medium">
            &copy; 2026 ShotByHamadi Media. All Rights Reserved.
        </p>
    </footer>

</body>
</html>
